<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Flow Dashboard</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>
    <style>
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect } = React;

        const msalConfig = {
            auth: {
                clientId: '0c0385dd-8b7e-4a9d-ad89-403082b8f8ce',
                authority: 'https://login.microsoftonline.com/2ae6a277-f72a-4953-a345-df52166894f2',
                redirectUri: 'https://cash-flow-sigma-teal.vercel.app/'
            },
            cache: {
                cacheLocation: 'localStorage'
            }
        };

        const loginRequest = {
            scopes: ['Files.Read.All', 'User.Read']
        };

        function CashFlowDashboard() {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [lastUpdate, setLastUpdate] = useState(null);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [msalInstance, setMsalInstance] = useState(null);

            const lineItems = [
                { row: 9, label: 'TOTAL REVENUE', bold: true },
                { row: 14, label: 'TOTAL COGS', bold: true },
                { row: 15, label: 'GROSS PROFIT', bold: true },
                { row: 16, label: 'Gross Profit Margin %', bold: false, percent: true },
                { row: 25, label: 'TOTAL LABOR COSTS', bold: true },
                { row: 26, label: 'Labor Cost % of Revenue', bold: false, percent: true },
                { row: 34, label: 'TOTAL OCCUPANCY', bold: true },
                { row: 42, label: 'TOTAL UTILITIES', bold: true },
                { row: 50, label: 'TOTAL MARKETING', bold: true },
                { row: 58, label: 'TOTAL REPAIRS & MAINTENANCE', bold: true },
                { row: 68, label: 'TOTAL TECH & G&A', bold: true },
                { row: 71, label: 'EBITDA', bold: true },
                { row: 73, label: 'NET CHANGE IN CASH', bold: true, highlight: true },
                { row: 85, label: 'CLOSING CASH BALANCE', bold: true, highlight: true },
            ];

            useEffect(() => {
                initializeMsal();
            }, []);

            const initializeMsal = async () => {
                try {
                    const instance = new msal.PublicClientApplication(msalConfig);
                    await instance.initialize();
                    setMsalInstance(instance);

                    const accounts = instance.getAllAccounts();
                    if (accounts.length > 0) {
                        setIsAuthenticated(true);
                        fetchExcelData(instance, accounts[0]);
                    } else {
                        setLoading(false);
                    }
                } catch (err) {
                    setError('Failed to initialize: ' + err.message);
                    setLoading(false);
                }
            };

            const handleLogin = async () => {
                try {
                    await msalInstance.loginPopup(loginRequest);
                    const accounts = msalInstance.getAllAccounts();
                    if (accounts.length > 0) {
                        setIsAuthenticated(true);
                        fetchExcelData(msalInstance, accounts[0]);
                    }
                } catch (err) {
                    setError('Login failed: ' + err.message);
                }
            };

            const fetchExcelData = async (instance, account) => {
                try {
                    setLoading(true);
                    setError(null);

                    const tokenResponse = await instance.acquireTokenSilent({
                        ...loginRequest,
                        account: account
                    });

                    // Use direct file ID from share link
                    const fileId = 'IQB_1Y0mHhThQrKxCFKR2zLjAVz4728Diprm3yr408fm3qo';

                    const contentResponse = await fetch(
                        `https://graph.microsoft.com/v1.0/drive/items/${fileId}/content`,
                        {
                            headers: {
                                Authorization: `Bearer ${tokenResponse.accessToken}`
                            }
                        }
                    );

                    if (!contentResponse.ok) {
                        throw new Error('Failed to fetch file: ' + contentResponse.status);
                    }

                    const arrayBuffer = await contentResponse.arrayBuffer();
                    const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];

                    const extractWeekData = (startCol, endCol) => {
                        const data = {};
                        lineItems.forEach(item => {
                            const rowValues = [];
                            for (let col = startCol; col <= endCol; col++) {
                                const cellRef = XLSX.utils.encode_cell({ r: item.row - 1, c: col });
                                const cell = worksheet[cellRef];
                                const value = cell ? cell.v : 0;
                                rowValues.push(typeof value === 'number' ? value : 0);
                            }
                            data[item.row] = rowValues;
                        });
                        return data;
                    };

                    const parsedData = {
                        lastWeek: {
                            headers: ['YODMM', 'YOSTD', 'PXSTD', 'CULINARY', 'TOTAL'],
                            data: extractWeekData(1, 5)
                        },
                        currentWeek: {
                            headers: ['YODMM', 'YOSTD', 'PXSTD', 'CULINARY', 'TOTAL'],
                            data: extractWeekData(6, 10)
                        }
                    };

                    setData(parsedData);
                    setLastUpdate(new Date().toLocaleTimeString());
                } catch (err) {
                    setError('Failed to load data: ' + err.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleLogout = () => {
                msalInstance.logout();
                setIsAuthenticated(false);
                setData(null);
            };

            const formatNumber = (value, percent = false) => {
                if (value === null || value === undefined) return '—';
                if (percent) return (value * 100).toFixed(1) + '%';
                return new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'AED',
                    minimumFractionDigits: 0,
                    maximumFractionDigits: 0,
                }).format(value);
            };

            if (!isAuthenticated) {
                return React.createElement('div', { className: 'min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-4' },
                    React.createElement('div', { className: 'bg-white rounded-lg shadow-xl p-8 max-w-md w-full' },
                        React.createElement('h1', { className: 'text-3xl font-bold text-slate-900 mb-2' }, 'Cash Flow Dashboard'),
                        React.createElement('p', { className: 'text-slate-600 mb-6' }, 'View your live restaurant cash flow data'),
                        React.createElement('button', {
                            onClick: handleLogin,
                            className: 'w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors mb-4'
                        }, 'Sign in with Microsoft'),
                        React.createElement('p', { className: 'text-xs text-slate-500 text-center' },
                            'Sign in to access your OneDrive files'
                        )
                    )
                );
            }

            if (loading) {
                return React.createElement('div', { className: 'min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center' },
                    React.createElement('div', { className: 'text-center' },
                        React.createElement('div', { className: 'w-8 h-8 text-blue-400 animate-spin mx-auto mb-4 inline-block border-4 border-blue-400 border-t-transparent rounded-full' }),
                        React.createElement('p', { className: 'text-white' }, 'Loading cash flow data...')
                    )
                );
            }

            return React.createElement('div', { className: 'min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 p-4' },
                React.createElement('div', { className: 'max-w-7xl mx-auto' },
                    React.createElement('div', { className: 'flex justify-between items-center mb-8' },
                        React.createElement('div', null,
                            React.createElement('h1', { className: 'text-4xl font-bold text-white mb-1' }, 'Cash Flow Dashboard'),
                            React.createElement('p', { className: 'text-slate-400' }, 'Last updated: ' + lastUpdate)
                        ),
                        React.createElement('div', { className: 'flex gap-3' },
                            React.createElement('button', {
                                onClick: () => fetchExcelData(msalInstance, msalInstance.getAllAccounts()[0]),
                                className: 'bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg'
                            }, '⟳ Refresh'),
                            React.createElement('button', {
                                onClick: handleLogout,
                                className: 'bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg'
                            }, '→ Logout')
                        )
                    ),

                    error && React.createElement('div', { className: 'bg-red-900/50 border border-red-500 rounded-lg p-4 mb-6 text-red-200' }, error),

                    data && React.createElement('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-6' },
                        React.createElement('div', { className: 'bg-white rounded-lg shadow-xl overflow-hidden' },
                            React.createElement('div', { className: 'bg-teal-700 px-6 py-4' },
                                React.createElement('h2', { className: 'text-2xl font-bold text-white' }, 'TOTAL WEEK 1'),
                                React.createElement('p', { className: 'text-teal-100 text-sm' }, 'Previous week completed')
                            ),
                            React.createElement('div', { className: 'overflow-x-auto' },
                                React.createElement('table', { className: 'w-full text-sm' },
                                    React.createElement('thead', null,
                                        React.createElement('tr', { className: 'bg-slate-100 border-b' },
                                            React.createElement('th', { className: 'px-4 py-3 text-left font-semibold' }, 'Line Item'),
                                            data.lastWeek.headers.map((h, i) =>
                                                React.createElement('th', { key: i, className: 'px-3 py-3 text-right font-semibold text-xs' }, h)
                                            )
                                        )
                                    ),
                                    React.createElement('tbody', null,
                                        lineItems.map((item) => {
                                            const values = data.lastWeek.data[item.row] || [];
                                            return React.createElement('tr', { key: item.row, className: `border-b hover:bg-slate-50 ${item.bold ? 'bg-slate-50 font-bold' : ''}` },
                                                React.createElement('td', { className: 'px-4 py-3' }, item.label),
                                                values.map((v, i) =>
                                                    React.createElement('td', { key: i, className: 'px-3 py-3 text-right text-xs' }, formatNumber(v, item.percent))
                                                )
                                            );
                                        })
                                    )
                                )
                            )
                        ),

                        React.createElement('div', { className: 'bg-white rounded-lg shadow-xl overflow-hidden' },
                            React.createElement('div', { className: 'bg-blue-700 px-6 py-4' },
                                React.createElement('h2', { className: 'text-2xl font-bold text-white' }, 'TOTAL WEEK 2'),
                                React.createElement('p', { className: 'text-blue-100 text-sm' }, 'Current week in progress (updates daily)')
                            ),
                            React.createElement('div', { className: 'overflow-x-auto' },
                                React.createElement('table', { className: 'w-full text-sm' },
                                    React.createElement('thead', null,
                                        React.createElement('tr', { className: 'bg-slate-100 border-b' },
                                            React.createElement('th', { className: 'px-4 py-3 text-left font-semibold' }, 'Line Item'),
                                            data.currentWeek.headers.map((h, i) =>
                                                React.createElement('th', { key: i, className: 'px-3 py-3 text-right font-semibold text-xs' }, h)
                                            )
                                        )
                                    ),
                                    React.createElement('tbody', null,
                                        lineItems.map((item) => {
                                            const values = data.currentWeek.data[item.row] || [];
                                            return React.createElement('tr', { key: item.row, className: `border-b hover:bg-slate-50 ${item.bold ? 'bg-slate-50 font-bold' : ''}` },
                                                React.createElement('td', { className: 'px-4 py-3' }, item.label),
                                                values.map((v, i) =>
                                                    React.createElement('td', { key: i, className: 'px-3 py-3 text-right text-xs' }, formatNumber(v, item.percent))
                                                )
                                            );
                                        })
                                    )
                                )
                            )
                        )
                    ),

                    React.createElement('div', { className: 'mt-8 text-center text-slate-400 text-sm' },
                        React.createElement('p', null, 'Data syncs automatically from your OneDrive Excel file')
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(CashFlowDashboard));
    </script>
</body>
</html>
